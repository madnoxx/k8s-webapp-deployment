name: Lint and Test Helm Chart

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  helm-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.0

      - name: Helm Dependency Update
        run: helm dependency update ./ghost-blog

      - name: Helm Lint
        run: helm lint ./ghost-blog

      - name: Helm Template
        run: helm template test-release ./ghost-blog
